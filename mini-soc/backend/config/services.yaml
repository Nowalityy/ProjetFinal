# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

parameters:

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\Service\DetectionService:
        lazy: true

    App\State\ApiDoctrinePersistDecorator:
        autowire: false
        autoconfigure: false
        decorates: api_platform.doctrine.orm.state.persist_processor
        arguments:
            $persistProcessor: '@.inner'
            $passwordHasher: '@security.password_hasher'
            $security: '@security.helper'

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'
            - '../src/State/'
